<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер русского языка</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        img { max-width: 100%; height: auto; border-radius: 5px; margin-bottom: 15px; max-height: 300px; object-fit: contain; }
        input { padding: 10px; font-size: 16px; width: 80%; margin-bottom: 10px; border: 2px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 15px; font-weight: bold; font-size: 18px; min-height: 24px; }
        .correct { color: green; }
        .wrong { color: red; }
        .next-btn { display: none; margin-top: 10px; background: #28a745; }
    </style>
</head>
<body>

<div class="card">
    <h2>Что изображено на картинке?</h2>
    <img id="image" src="" alt="Задание">
    <input type="text" id="answer" placeholder="Введите слово..." autocomplete="off">
    <br>
    <button onclick="checkAnswer()">Проверить</button>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Следующее</button>
    <div class="result" id="result"></div>
</div>

<script>
    // === СЮДА МЫ ВСТАВИМ ВАШИ ДАННЫЕ ===
    const data = [
        { image: "images/cat.jpg", answer: "кот" },
        { image: "images/dog.jpg", answer: "собака" },
        { image: "images/house.jpg", answer: "дом" }
        // Добавьте сюда все свои пары "картинка - слово"
    ];

    let currentIndex = 0;

    function loadQuestion() {
        if (currentIndex >= data.length) {
            document.querySelector('.card').innerHTML = "<h3>Тренировка завершена! 🎉</h3><button onclick='location.reload()>Начать заново</button>";
            return;
        }
        const item = data[currentIndex];
        document.getElementById('image').src = item.image;
        document.getElementById('answer').value = '';
        document.getElementById('result').textContent = '';
        document.getElementById('result').className = 'result';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('answer').focus();
    }

    function checkAnswer() {
        const userAnswer = document.getElementById('answer').value.trim().toLowerCase();
        const correctAnswer = data[currentIndex].answer.toLowerCase();
        const resultDiv = document.getElementById('result');

        if (userAnswer === correctAnswer) {
            resultDiv.textContent = "Верно! ✅";
            resultDiv.className = "result correct";
            document.getElementById('nextBtn').style.display = 'inline-block';
        } else {
            resultDiv.textContent = "Неверно. Попробуйте еще раз ❌";
            resultDiv.className = "result wrong";
        }
    }

    function nextQuestion() {
        currentIndex++;
        loadQuestion();
    }

    // Запуск при загрузке
    loadQuestion();

    // Проверка по Enter
    document.getElementById('answer').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            if (document.getElementById('nextBtn').style.display === 'inline-block') {
                nextQuestion();
            } else {
                checkAnswer();
            }
        }
    });
</script>

</body>
</html>
